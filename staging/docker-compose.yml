# HHF Docs Staging — hhdocker01 (172.16.50.40)
# Deploy: docker compose -f staging/docker-compose.yml up -d
# Images werden von GitHub Actions gebaut und in GHCR gepusht

services:
  docs-crowdsec:
    image: ghcr.io/strausmann/docs-crowdsec-manager:latest
    container_name: docs-crowdsec-staging
    restart: unless-stopped
    ports:
      - "8081:3000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  docs-middleware:
    image: ghcr.io/strausmann/docs-middleware-manager:latest
    container_name: docs-middleware-staging
    restart: unless-stopped
    ports:
      - "8082:3000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
