name: Build CrowdSec Manager Docs

on:
  push:
    branches: [main]
    paths:
      - 'projects/crowdsec-manager/docs/**'
      - 'staging/Dockerfile.fumadocs'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/docs-crowdsec-manager

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL_CROWDSEC }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: projects/crowdsec-manager/docs
          file: staging/Dockerfile.fumadocs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update staging .env with new tag
        if: github.ref == 'refs/heads/main'
        run: |
          TAG="${{ steps.sha.outputs.short }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed -i "s/^CROWDSEC_DOCS_TAG=.*/CROWDSEC_DOCS_TAG=${TAG}/" staging/.env
          sed -i "s/^# Last updated:.*/# Last updated: ${TIMESTAMP}/" staging/.env
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add staging/.env
          git diff --cached --quiet || git commit -m "ci: update CROWDSEC_DOCS_TAG to ${TAG} [skip ci]"
          git push

      - name: Trigger Dockhand redeploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{}' | openssl dgst -sha256 -hmac '${{ secrets.DOCKHAND_WEBHOOK_SECRET }}' | awk '{print $2}')" \
            "${{ vars.DOCKHAND_WEBHOOK_URL }}" \
            -d '{}' || echo "Webhook trigger failed (non-critical)"
